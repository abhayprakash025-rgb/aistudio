  .btn-ok{background:#E6F7EC;color:var(--ok);}

  input,select,textarea{
    font-family:'Poppins',sans-serif;

    padding:9px 12px;
    font-size:14px;
    outline:none;
    width:100%;

  input:focus,select:focus,textarea:focus{border-color:var(--purple);}
