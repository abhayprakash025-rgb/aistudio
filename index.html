    setError(""); setSuccess("");
    if (!email || !pass) return setError("Email and password are required.");
    if (mode === "signup" && !name.trim()) return setError("Please enter your full name.");
    if (pass.length < 6) return setError("Password must be at least 6 characters.");
    setLoading(true);
    try {
      if (mode === "login") {
        const { data, error: e } = await sb.auth.signInWithPassword({ email, password: pass });
        if (e) throw e;
        onAuth(data.user);
      } else {
        const { data, error: e } = await sb.auth.signUp({ email, password: pass, options: { data: { name, college } } });
        if (e) throw e;
        if (data.user) {
          await sb.from("students").upsert({ id: data.user.id, name, email, college_name: college, created_at: new Date().toISOString() });
          setSuccess("Account created! Please sign in.");
          setMode("login"); setEmail(""); setPass("");

// ─── Dashboard ──────────────────────────────────────────────────────────────────
function Dashboard({ user, onLogout }) {
  const [blueprint, setBlueprint] = useState(null);
  const [careerDiscoveryDone, setCareerDiscoveryDone] = useState(false);
  const [resumeDone, setResumeDone] = useState(false);
  const [interviewDone, setInterviewDone] = useState(false);
  const [loadingData, setLoadingData] = useState(true);
  const e = React.createElement;

  const displayName = (user.user_metadata?.name || user.email?.split("@")[0] || "Student");
  const firstName = displayName.split(" ")[0];
  const college = user.user_metadata?.college || "";

  useEffect(() => {
    const load = async () => {
      try {
        // Check campus2board_sessions: if report is NOT NULL, Career Discovery is complete
        const { data: sessionData } = await sb.from("campus2board_sessions")
          .select("report")
          .eq("user_id", user.id)
          .maybeSingle();
        if (sessionData && sessionData.report !== null) {
          setCareerDiscoveryDone(true);
        }
      } catch(err) {}
      try {
        const { data } = await sb.from("career_blueprints").select("*").eq("student_id", user.id).order("created_at", { ascending:false }).limit(1).maybeSingle();
        setBlueprint(data);
      } catch(err) {}
      try {
        // Check campus2board_resume: resume_downloaded NOT NULL means CV step is done
        const { data: resumeData } = await sb.from("campus2board_resume")
          .select("resume_downloaded")
          .eq("user_id", user.id)
          .maybeSingle();
        if (resumeData && resumeData.resume_downloaded !== null) {
          setResumeDone(true);
        }
      } catch(err) {}
      try {
        // Check student_reports: any row with overall_feedback NOT NULL means interview done
        const { data: reportData } = await sb.from("student_reports")
          .select("overall_feedback")
          .eq("student_id", user.id)
          .not("overall_feedback", "is", null)
          .limit(1)
          .maybeSingle();
        if (reportData) {
          setInterviewDone(true);
        }
      } catch(err) {}
      setLoadingData(false);
    };
    load();
  }, [user.id]);

  const handleModuleClick = async (modId) => {
    const { data: { session } } = await sb.auth.getSession();
    const p = new URLSearchParams({ name:displayName, email:user.email||"", college, student_id:user.id });
    let baseUrl;
    if (modId === "career-discovery") baseUrl = CAREER_DISCOVERY_URL;
    else if (modId === "resume-builder") baseUrl = RESUME_BUILDER_URL;
    else if (modId === "interview-training") baseUrl = INTERVIEW_TRAINING_URL;
    else return;
    let finalUrl = `${baseUrl}?${p.toString()}`;
    if (session) finalUrl += `#access_token=${session.access_token}&refresh_token=${session.refresh_token}`;
    window.open(finalUrl, "_blank");
  };

  const hasBlueprint = !!blueprint;
  const fitScore = blueprint?.recommendation_confidence || (blueprint?.report_data?.recommendationConfidence) || 0;
  const topMatches = blueprint?.report_data?.topCareerMatches || [];

  // Career Discovery complete if sessions.report is NOT NULL OR a blueprint exists
  const isCareerDiscoveryComplete = careerDiscoveryDone || hasBlueprint;

  const progressSteps = [
    { label:"Profile Created", done:true },
    { label:"Career Discovery", done:isCareerDiscoveryComplete },
    { label:"Resume Builder", done:resumeDone },
    { label:"Interview Training", done:interviewDone },
    { label:"Applied to Role", done:false },
  ];
  const progressPct = Math.round((progressSteps.filter(s=>s.done).length / progressSteps.length) * 100);

  return e("div", { style: { minHeight:"100vh", background:C.bgSec } },
    // Navbar
    e("nav", { style: { background:C.purple, padding:"0 28px", height:64, display:"flex", alignItems:"center", justifyContent:"space-between",

          e("div", { style: { color:C.lavender, fontSize:10, fontWeight:600, letterSpacing:"1px", textTransform:"uppercase" } }, "Student Portal")
        )

        e("div", { style: { textAlign:"right" } },
          e("div", { style: { color:C.white, fontSize:14, fontWeight:600 } }, displayName),
          college && e("div", { style: { color:C.lavender, fontSize:11 } }, college)
        ),
        e("button", { onClick:onLogout, style: { background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8,
          padding:"7px 14px", color:C.white, cursor:"pointer", display:"flex", alignItems:"center", gap:7, fontSize:13, fontWeight:500 } },
          e(Icons.logout), "Sign Out"
        )
      )

    e("div", { style: { maxWidth:1120, margin:"0 auto", padding:"36px 24px" } },

      // ── Hero Banner ─────────────────────────────────────────────────────────
      e("div", { className:"fade-in", style: { background:`linear-gradient(135deg, ${C.purple} 0%, ${C.purpleLight} 60%, #5B21B6 100%)`,
        borderRadius:24, padding:"36px 40px", marginBottom:36, position:"relative", overflow:"hidden" } },
        e("div", { style: { position:"absolute", top:-60, right:-60, width:280, height:280, borderRadius:"50%", background:"rgba(245,158,11,0.1)" } }),
        e("div", { style: { position:"absolute", bottom:-80, right:140, width:200, height:200, borderRadius:"50%", background:"rgba(127,107,179,0.15)" } }),
        e("div", { style: { position:"relative", zIndex:1 } },
          e("div", { style: { display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:24 } },
            e("div", null,
              e("p", { style: { color:C.gold, fontSize:12, fontWeight:700, letterSpacing:"1.5px", textTransform:"uppercase", margin:"0 0 10px" } }, "Welcome back"),
              e("h1", { style: { color:C.white, fontSize:26, fontWeight:900, margin:"0 0 10px", letterSpacing:"-0.5px", lineHeight:1.2 } },
                `${firstName}, build your career with confidence.`
              ),
              e("p", { style: { color:"rgba(255,255,255,0.6)", fontSize:14, margin:0, maxWidth:460, lineHeight:1.6 } },
                hasBlueprint
                  ? "Your Career Blueprint is ready. Continue building your profile to unlock all 5 modules."
                  : isCareerDiscoveryComplete
                    ? "Career Discovery complete! Upload your CV next to keep building your profile."
                    : "Start with Career Discovery — a 15-minute AI assessment that maps your strengths to the right MBA roles."
              )
            ),
            hasBlueprint && fitScore > 0 && e("div", { style: { background:"rgba(255,255,255,0.1)", backdropFilter:"blur(12px)",
              borderRadius:18, padding:"22px 32px", textAlign:"center", border:"1px solid rgba(255,255,255,0.15)", flexShrink:0 } },
              e("div", { style: { color:C.gold, fontSize:42, fontWeight:900, lineHeight:1, fontFamily:"monospace" } }, fitScore + "%"),
              e("div", { style: { color:"rgba(255,255,255,0.6)", fontSize:11, fontWeight:700, marginTop:5, letterSpacing:"0.8px", textTransform:"uppercase" } }, "Career Fit Score")
            )
          ),

          // Progress
          e("div", { style: { marginTop:28 } },
            e("div", { style: { display:"flex", justifyContent:"space-between", marginBottom:7 } },
              e("span", { style: { color:"rgba(255,255,255,0.55)", fontSize:11, fontWeight:700, letterSpacing:"0.8px", textTransform:"uppercase" } }, "Profile Completion"),
              e("span", { style: { color:C.gold, fontSize:12, fontWeight:800 } }, `${progressPct}%`)
            ),
            e("div", { style: { background:"rgba(255,255,255,0.12)", borderRadius:100, height:8, overflow:"hidden" } },
              e("div", { style: { background:`linear-gradient(90deg, ${C.gold}, ${C.goldLight})`, height:"100%", width:`${progressPct}%`, borderRadius:100, transition:"width 1.2s ease" } })
            ),
            e("div", { style: { display:"flex", gap:20, marginTop:12, flexWrap:"wrap" } },
              progressSteps.map((s,i) => e("div", { key:i, style: { display:"flex", alignItems:"center", gap:6,
                color:s.done ? C.gold : "rgba(255,255,255,0.35)", fontSize:11, fontWeight:600 } },
                e("div", { style: { width:16, height:16, borderRadius:"50%", background:s.done ? C.gold : "rgba(255,255,255,0.15)",
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:s.done ? C.purple : "transparent", fontWeight:900 } }, s.done ? "✓" : ""),
                s.label
              ))
            )
          )
        )
      ),

      // ── Blueprint Preview ──────────────────────────────────────────────────
      hasBlueprint && topMatches.length > 0 && e("div", { className:"fade-in",
        style: { background:C.white, borderRadius:18, border:`1px solid ${C.border}`, padding:28,
          marginBottom:32, borderLeft:`5px solid ${C.gold}`, boxShadow:"0 2px 12px rgba(75,0,130,0.06)" } },
        e("div", { style: { display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20, flexWrap:"wrap", gap:12 } },
          e("div", null,
            e("h3", { style: { margin:0, fontSize:17, fontWeight:800, color:C.charcoal } }, "Your Career Blueprint"),
            e("p", { style: { margin:"4px 0 0", fontSize:13, color:C.muted } },
              `Generated ${new Date(blueprint.created_at).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}`
            )
          ),
          e("button", { onClick:() => handleModuleClick("career-discovery"), style: { background:"transparent", color:C.purple, border:`2px solid ${C.purple}`,
            borderRadius:10, padding:"9px 18px", fontWeight:600, fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", gap:6 } },
            "View Full Report ", e(Icons.chevron))
        ),
        e("div", { style: { display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))", gap:14 } },
          topMatches.slice(0,3).map((m,i) => e("div", { key:i,
            style: { background:C.lavenderBg, borderRadius:12, padding:"16px 18px", border:`1px solid ${C.border}` } },
            e("div", { style: { display:"flex", alignItems:"center", gap:5, marginBottom:6 } },
              e(Icons.star), e("span", { style: { fontSize:10, fontWeight:700, color:C.purple, textTransform:"uppercase", letterSpacing:"0.5px" } }, m.domain)
            ),
            e("div", { style: { fontSize:14, fontWeight:700, color:C.charcoal, marginBottom:4 } }, m.roleTitle),
            e("div", { style: { fontSize:24, fontWeight:900, color:C.purple, fontFamily:"monospace" } }, `${m.careerFitScore}%`),
            e("div", { style: { fontSize:11, color:C.muted, marginTop:2 } }, "Career Fit")
          ))
        )
      ),

      // ── Module Cards ────────────────────────────────────────────────────────
      e("h2", { style: { fontSize:20, fontWeight:800, color:C.charcoal, margin:"0 0 20px", letterSpacing:"-0.3px" } }, "Your Learning Modules"),
      e("div", { style: { display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(310px, 1fr))", gap:20 } },
        MODULES.map(mod => {
          const ModIcon = Icons[mod.icon];
          return e("div", { key:mod.id, className:`module-card ${mod.live ? "live" : ""}`,
            // UPDATED: Dynamic routing based on module ID
            onClick:() => mod.live && handleModuleClick(mod.id),
            style: { background:C.white, borderRadius:18, border:`1px solid ${C.border}`, padding:28,
              cursor:mod.live ? "pointer" : "default", position:"relative", overflow:"hidden",
              boxShadow:"0 2px 8px rgba(75,0,130,0.05)", opacity:mod.live ? 1 : 0.82 } },
            // Top accent
            e("div", { style: { position:"absolute", top:0, left:0, right:0, height:4,
              background:mod.live ? `linear-gradient(90deg, ${mod.color}, ${mod.accent})` : C.border, borderRadius:"18px 18px 0 0" } }),
            // Header
            e("div", { style: { display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:18, paddingTop:6 } },
              e("div", { style: { display:"flex", alignItems:"center", gap:12 } },
                e("div", { style: { width:46, height:46, borderRadius:13, background:`${mod.color}12`,
                  display:"flex", alignItems:"center", justifyContent:"center", color:mod.color } }, e(ModIcon)),
                e("span", { style: { fontSize:30, fontWeight:900, color:`${mod.color}18`, fontFamily:"monospace", lineHeight:1 } }, mod.num)
              ),
              e("span", { style: { display:"inline-flex", alignItems:"center", background:`${mod.badgeColor}14`,
                color:mod.badgeColor, borderRadius:20, padding:"4px 12px", fontSize:11, fontWeight:700, letterSpacing:"0.3px" } }, mod.badge)
            ),
            e("h3", { style: { margin:"0 0 4px", fontSize:16, fontWeight:800, color:C.charcoal, letterSpacing:"-0.2px" } }, mod.title),
            e("p", { style: { margin:"0 0 12px", fontSize:11, fontWeight:700, color:mod.color, textTransform:"uppercase", letterSpacing:"0.6px" } }, mod.sub),
            e("p", { style: { margin:"0 0 22px", fontSize:13.5, color:C.muted, lineHeight:1.65 } }, mod.desc),
            
            // UPDATED: Dynamic routing for the button click
            e("button", { onClick:ev => { ev.stopPropagation(); mod.live && handleModuleClick(mod.id); }, disabled:!mod.live,
              style: { background:mod.live ? C.purple : C.border, color:mod.live ? C.white : C.muted, border:"none",
                borderRadius:10, padding:"11px 20px", fontWeight:600, fontSize:13, cursor:mod.live ? "pointer" : "not-allowed",
                width:"100%", display:"flex", alignItems:"center", justifyContent:"center", gap:8 } },
              mod.live ? [mod.cta, e(Icons.chevron)] : "Coming Soon"
            )
          );
        })
      ),

      // Footer
      e("div", { style: { textAlign:"center", marginTop:52, paddingBottom:24 } },
        e("p", { style: { color:C.muted, fontSize:13 } },
          "Campus2Board · MBA Career Readiness Platform · ",
          e("span", { style: { color:C.purple, fontWeight:700 } }, "app.campus2board.com")
        )
      )
    )
  );
}

// ─── Root ───────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);
  const e = React.createElement;

  useEffect(() => {
    sb.auth.getSession().then(({ data:{ session } }) => { setUser(session?.user ?? null); setChecking(false); });
    const { data:{ subscription } } = sb.auth.onAuthStateChange((_ev, session) => setUser(session?.user ?? null));
    return () => subscription.unsubscribe();
  }, []);

  if (checking) return e("div", { style: { minHeight:"100vh", background:C.purple, display:"flex", alignItems:"center", justifyContent:"center" } },
    e("div", { style: { textAlign:"center" } },
      e("div", { style: { width:52, height:52, background:C.gold, borderRadius:14, display:"flex", alignItems:"center", justifyContent:"center",
        fontWeight:900, fontSize:24, color:C.purple, margin:"0 auto 16px" } }, "C"),
      e("div", { className:"spinner", style: { margin:"0 auto" } })
    )
  );

  if (!user) return e(AuthScreen, { onAuth:setUser });
  return e(Dashboard, { user, onLogout:async () => { await sb.auth.signOut(); setUser(null); } });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
