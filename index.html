// ─── Gemini AI Helper ──────────────────────────────────────────────────────────
// Key is NEVER in client JS — all Gemini calls go through Supabase Edge Function.
// Deploy supabase/functions/gemini-proxy/index.ts (file provided separately).
async function callGemini(prompt) {
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/gemini-proxy`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${session?.access_token || SUPABASE_ANON_KEY}`
      },
      body: JSON.stringify({ prompt })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data?.text || null;
  } catch { return null; }
}

async function getAIMatch(studentId, job, studentProfile) {
  // 1. Check cache in ai_matches table
  try {
    const { data: cached } = await sb.from("ai_matches").select("*").eq("student_id", studentId).eq("job_id", job.id).maybeSingle();
    if (cached) return cached;
  } catch {}

  // 2. Call Gemini if no cache
  if (!GEMINI_API_KEY) return null;
  const prompt = `You are a career counsellor for MBA students. Analyse this student's profile against the job and respond in JSON only.

Student profile: ${JSON.stringify(studentProfile || { skills: [], experience: "MBA student" })}

Job: ${job.title} at ${job.company}
Domain: ${job.domain}
Requirements: ${(job.skills || []).join(", ")}
Description: ${job.description || ""}

Respond in this exact JSON format (no markdown):
{
  "match_score": <0-100 integer>,
  "summary": "<2 sentence insight on fit>",
  "skill_gaps": ["<gap1>", "<gap2>"],
  "strengths": ["<strength1>", "<strength2>"],
  "interview_questions": ["<q1>", "<q2>", "<q3>"]
}`;

  const raw = await callGemini(prompt);
  if (!raw) return null;
  try {
    const clean = raw.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);
    // Cache it
    try {
      await sb.from("ai_matches").insert({ student_id: studentId, job_id: job.id, ...parsed });
    } catch {}
    return parsed;
  } catch { return null; }
}

// ─── Explore Opportunities Page ─────────────────────────────────────────────────
function ExploreOpportunitiesPage({ user, onBack }) {
  const [allJobs, setAllJobs] = useState([]);
  const [loadingJobs, setLoadingJobs] = useState(true);
  const [usingMockData, setUsingMockData] = useState(false);
  const [filters, setFilters] = useState({ sortBy:"match" });
  const [selectedJob, setSelectedJob] = useState(null);
  const [savedJobs, setSavedJobs] = useState([]);
  const [appliedJobIds, setAppliedJobIds] = useState(new Set());
  const [applications, setApplications] = useState([]);
  const [studentProfile, setStudentProfile] = useState(null);
  const [activeView, setActiveView] = useState("jobs"); // "jobs" | "saved" | "applied"

  const displayName = user?.user_metadata?.name || user?.email?.split("@")[0] || "Student";

  // Load jobs + student data
  useEffect(() => {
    const load = async () => {
      setLoadingJobs(true);
      // Load student profile
      try {
        const { data: bp } = await sb.from("career_blueprints").select("*").eq("student_id", user.id).order("created_at", { ascending:false }).limit(1).maybeSingle();
        setStudentProfile(bp?.report_data || null);
      } catch {}
      // Load saved jobs
      try {
        const { data: saved } = await sb.from("saved_jobs").select("*, jobs(*)").eq("student_id", user.id);
        setSavedJobs(saved || []);
      } catch {}
      // Load applications
      try {
        const { data: apps } = await sb.from("applications").select("*, jobs(*)").eq("student_id", user.id);
        setApplications(apps || []);
        setAppliedJobIds(new Set((apps||[]).map(a => a.job_id)));
      } catch {}
      // Load jobs
      try {
        const { data: jobs, error } = await sb.from("jobs").select("*").eq("is_active", true).order("match_score", { ascending:false });
        if (error || !jobs || jobs.length === 0) {
          setAllJobs(MOCK_JOBS);
          setUsingMockData(true);
        } else {
          setAllJobs(jobs);
          setUsingMockData(false);
        }
      } catch {
        setAllJobs(MOCK_JOBS);
        setUsingMockData(true);
      }
      setLoadingJobs(false);
    };
    load();
  }, [user.id]);

  // Filter + sort jobs client-side
  const filteredJobs = useMemo(() => {
    let list = [...allJobs];
    if (filters.search) {
      const q = filters.search.toLowerCase();
      list = list.filter(j => j.title?.toLowerCase().includes(q) || j.company?.toLowerCase().includes(q) || j.domain?.toLowerCase().includes(q) || j.skills?.some(s => s.toLowerCase().includes(q)));
    }
    if (filters.type) list = list.filter(j => j.type === filters.type);
    if (filters.domain) list = list.filter(j => j.domain === filters.domain);
    if (filters.readiness) list = list.filter(j => j.readiness === filters.readiness);
    if (filters.sortBy === "match") list.sort((a,b) => (b.match_score||0)-(a.match_score||0));
    else if (filters.sortBy === "recent") list.sort((a,b) => new Date(b.created_at||0)-new Date(a.created_at||0));
    return list;
  }, [allJobs, filters]);

  const handleSave = async (job) => {
    const alreadySaved = savedJobs.some(s => s.job_id === job.id);
    if (alreadySaved) {
      try { await sb.from("saved_jobs").delete().eq("student_id", user.id).eq("job_id", job.id); } catch {}
      setSavedJobs(prev => prev.filter(s => s.job_id !== job.id));
    } else {
      try { await sb.from("saved_jobs").insert({ student_id: user.id, job_id: job.id }); } catch {}
      setSavedJobs(prev => [...prev, { job_id: job.id, jobs: job }]);
    }
  };

  const handleApply = async (job) => {
    if (appliedJobIds.has(job.id)) return;
    try { await sb.from("applications").insert({ student_id: user.id, job_id: job.id, status:"applied" }); } catch {}
    setAppliedJobIds(prev => new Set([...prev, job.id]));
    setApplications(prev => [...prev, { job_id: job.id, status:"applied", jobs: job, applied_at: new Date().toISOString() }]);
  };

  const savedJobIds = new Set(savedJobs.map(s => s.job_id));

  return e("div", { style: { minHeight:"100vh", background:C.bgSec } },
    // Navbar
    e("nav", { style: { background:C.purple, padding:"0 28px", height:64, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 20px rgba(75,0,130,0.35)" } },
      e("div", { style: { display:"flex", alignItems:"center", gap:12 } },
        e("button", { onClick:onBack, style: { background:"rgba(255,255,255,0.12)", border:"none", borderRadius:8, padding:"7px 10px", cursor:"pointer", color:C.white, display:"flex", alignItems:"center" } }, e(Icons.arrowLeft)),
        e("div", { style: { width:38, height:38, background:C.gold, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:20, color:C.purple } }, "C"),
        e("div", null,
          e("div", { style: { color:C.white, fontWeight:800, fontSize:17, letterSpacing:"-0.3px" } }, "Explore Opportunities"),
          e("div", { style: { color:C.lavender, fontSize:10, fontWeight:600, letterSpacing:"1px", textTransform:"uppercase" } }, "Jobs · Internships · Live Projects")
        )
      ),
      e("div", { style: { display:"flex", alignItems:"center", gap:10 } },
        [["jobs","Openings"], ["saved","Saved"], ["applied","Applied"]].map(([v,label]) =>
          e("button", { key:v, onClick:() => setActiveView(v), style: { background:activeView===v ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.08)", border:"none", borderRadius:8, padding:"7px 14px", color:C.white, cursor:"pointer", fontSize:12, fontWeight:600 } },
            label + (v==="saved" && savedJobs.length > 0 ? ` (${savedJobs.length})` : v==="applied" && applications.length > 0 ? ` (${applications.length})` : "")
          )
        )
      )
    ),
    e("div", { style: { maxWidth:1200, margin:"0 auto", padding:"28px 24px" } },
      // Hero Banner
      e("div", { style: { background:`linear-gradient(135deg, ${C.purple} 0%, #6A0DAD 100%)`, borderRadius:20, padding:"28px 32px", marginBottom:24, position:"relative", overflow:"hidden" } },
        e("div", { style: { position:"absolute", top:-40, right:-40, width:220, height:220, borderRadius:"50%", background:"rgba(245,158,11,0.12)" } }),
        e("div", { style: { position:"absolute", bottom:-50, right:160, width:150, height:150, borderRadius:"50%", background:"rgba(127,107,179,0.18)" } }),
        e("div", { style: { position:"relative", zIndex:1 } },
          e("div", { style: { display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:20, marginBottom:24 } },
            e("div", null,
              e("p", { style: { color:C.gold, fontSize:12, fontWeight:700, letterSpacing:"1.2px", textTransform:"uppercase", margin:"0 0 8px" } }, "AI-Matched Opportunities"),
              e("h1", { style: { color:C.white, fontSize:24, fontWeight:800, margin:"0 0 8px", letterSpacing:"-0.4px" } }, "Browse Verified Openings"),
              e("p", { style: { color:"rgba(255,255,255,0.6)", fontSize:14, margin:0, maxWidth:440 } },

              )
            ),
            e("div", { style: { display:"flex", gap:12, flexWrap:"wrap" } },
              [
                { value: allJobs.length, label:"Matched Openings", color:C.gold },
                { value: applications.length, label:"Applications Sent", color:"#A7F3D0" },
                { value: savedJobs.length, label:"Saved Jobs", color:"#BFDBFE" },
              ].map((s,i) => e("div", { key:i, style: { background:"rgba(255,255,255,0.1)", borderRadius:12, padding:"14px 20px", textAlign:"center", backdropFilter:"blur(8px)", border:"1px solid rgba(255,255,255,0.12)", minWidth:90 } },
                e("div", { style: { color:s.color, fontSize:28, fontWeight:900, lineHeight:1, fontFamily:"monospace" } }, s.value),
                e("div", { style: { color:"rgba(255,255,255,0.55)", fontSize:10, fontWeight:700, marginTop:5, letterSpacing:"0.6px", textTransform:"uppercase" } }, s.label)
              ))
            )
          ),
          e("div", { style: { display:"flex", gap:8, flexWrap:"wrap" } },
            [
              { icon:"🏢", label:"38 Verified Recruiters" },
              { icon:"✅", label:"Background-checked companies" },
              { icon:"⚡", label:"AI-matched to your profile" },
              { icon:"🚀", label:"One-click apply" },
            ].map((tag,i) => e("div", { key:i, style: { display:"flex", alignItems:"center", gap:5, background:"rgba(255,255,255,0.08)", borderRadius:20, padding:"5px 12px", color:"rgba(255,255,255,0.75)", fontSize:12, fontWeight:500 } },
              e("span", null, tag.icon), tag.label
            ))
          )
        )
      ),
      usingMockData && e("div", { style: { background:"#FFFBEB", border:"1px solid #FDE68A", borderRadius:10, padding:"10px 16px", marginBottom:16, display:"flex", alignItems:"center", gap:10 } },
        e("span", { style: { fontSize:14 } }, "⚠️"),
        e("span", { style: { fontSize:13, color:"#92400E" } }, "Showing sample data. Run ", e("code", { style:{fontFamily:"monospace", background:"rgba(0,0,0,0.06)", padding:"1px 5px", borderRadius:4} }, "schema.sql"), " in Supabase to show real jobs.")
      ),
      // Main Content
      activeView === "jobs" && e("div", null,
        e(FilterBar, { filters, onChange:setFilters }),
        e("div", { style: { marginTop:20 } },
          loadingJobs ? e("div", { style: { textAlign:"center", padding:"60px 0" } },
            e("div", { className:"spinner", style: { margin:"0 auto", borderTopColor:C.purple, borderColor:`${C.purple}30` } })
          ) : filteredJobs.length === 0 ?
            e("div", { style: { textAlign:"center", padding:"60px 0", color:C.muted } },
              e("div", { style: { fontSize:36, marginBottom:12 } }, "🔍"),
              e("p", { style: { fontSize:15, fontWeight:600 } }, "No jobs match your filters"),
              e("p", { style: { fontSize:13, marginTop:6 } }, "Try clearing some filters to see more results.")
            ) :
            e("div", { style: { display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:16, marginTop:4 } },
              filteredJobs.map(job => e(JobCard, { key:job.id, job, onView:setSelectedJob, isSaved:savedJobIds.has(job.id), onSave:handleSave, isApplied:appliedJobIds.has(job.id) }))
            )
        )
      ),
      activeView === "saved" && e("div", null,
        savedJobs.length === 0 ?
          e("div", { style: { textAlign:"center", padding:"60px 0", color:C.muted } },
            e("div", { style: { fontSize:36, marginBottom:12 } }, "🔖"),
            e("p", { style: { fontSize:15, fontWeight:600 } }, "No saved jobs yet"),
            e("button", { onClick:() => setActiveView("jobs"), style: { marginTop:16, background:C.purple, color:C.white, border:"none", borderRadius:10, padding:"10px 20px", fontWeight:600, fontSize:14, cursor:"pointer" } }, "Browse Openings")
          ) :
          e("div", { style: { display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:16 } },

              const job = s.jobs || s;
              return e(JobCard, { key:job.id, job, onView:setSelectedJob, isSaved:true, onSave:handleSave, isApplied:appliedJobIds.has(job.id) });
            })
          )
      ),
      activeView === "applied" && e("div", null,
        applications.length === 0 ?

            e("div", { style: { fontSize:36, marginBottom:12 } }, "📋"),

          ) :

                ),
                e("span", { style: { background:`${statusColors[app.status]||C.muted}15`, color:statusColors[app.status]||C.muted, borderRadius:20, padding:"4px 12px", fontSize:11, fontWeight:700, textTransform:"capitalize", whiteSpace:"nowrap" } }, app.status)
              );
            })
          )
      )
    ),
    selectedJob && e(JobDetailDrawer, {
      job: selectedJob,
      onClose: () => setSelectedJob(null),
      studentId: user.id,
      studentProfile,
      savedJobs: savedJobs,
      onSave: handleSave,
      onApply: handleApply,
      appliedJobIds,
    })
  );
}

// ─── Dashboard ──────────────────────────────────────────────────────────────────
function Dashboard({ user, onLogout }) {
  const [view, setView] = useState("home"); // "home" | "opportunities"
  const [blueprint, setBlueprint] = useState(null);
  const [careerDiscoveryDone, setCareerDiscoveryDone] = useState(false);
  const [resumeDone, setResumeDone] = useState(false);
  const [interviewDone, setInterviewDone] = useState(false);
  const [loadingData, setLoadingData] = useState(true);

  const displayName = (user.user_metadata?.name || user.email?.split("@")[0] || "Student");
  const firstName = displayName.split(" ")[0];
  const college = user.user_metadata?.college || "";

  useEffect(() => {
    const load = async () => {
      try {
        const { data: sessionData } = await sb.from("campus2board_sessions").select("report").eq("user_id", user.id).maybeSingle();
        if (sessionData && sessionData.report !== null) setCareerDiscoveryDone(true);
      } catch {}
      try {
        const { data } = await sb.from("career_blueprints").select("*").eq("student_id", user.id).order("created_at", { ascending:false }).limit(1).maybeSingle();
        setBlueprint(data);
      } catch {}
      try {
        const userId = String(user.id);
        let resumeData = null;
        const { data: r1 } = await sb.from("campus2board_resume").select("resume_downloaded, downloaded_pdf, downloaded_word").eq("user_id", userId).maybeSingle();
        if (r1) resumeData = r1;
        if (!resumeData) {
          const { data: r2 } = await sb.from("campus2board_resume").select("resume_downloaded, downloaded_pdf, downloaded_word").eq("student_id", userId).maybeSingle();
          if (r2) resumeData = r2;
        }
        if (resumeData && (resumeData.resume_downloaded !== null || resumeData.downloaded_pdf === true || resumeData.downloaded_word === true)) setResumeDone(true);
      } catch {}
      try {
        const { data: reportData } = await sb.from("student_reports").select("overall_feedback").eq("student_id", user.id).not("overall_feedback", "is", null).limit(1).maybeSingle();
        if (reportData) setInterviewDone(true);
      } catch {}
      setLoadingData(false);
    };
    load();
  }, [user.id]);

  if (view === "opportunities") return e(ExploreOpportunitiesPage, { user, onBack:() => setView("home") });

  const handleModuleClick = async (modId) => {
    if (modId === "opportunities") { setView("opportunities"); return; }
    const { data: { session } } = await sb.auth.getSession();
    const p = new URLSearchParams({ name:displayName, email:user.email||"", college, student_id:user.id });
    let baseUrl;
    if (modId === "career-discovery") baseUrl = CAREER_DISCOVERY_URL;
    else if (modId === "resume-builder") baseUrl = RESUME_BUILDER_URL;
    else if (modId === "interview-training") baseUrl = INTERVIEW_TRAINING_URL;
    else if (modId === "workplace-simulation") baseUrl = WORKPLACE_SIMULATION_URL;
    else return;
    let finalUrl = `${baseUrl}?${p.toString()}`;
    if (session) finalUrl += `#access_token=${session.access_token}&refresh_token=${session.refresh_token}`;
    window.open(finalUrl, "_blank");
  };

  const hasBlueprint = !!blueprint;
  const fitScore = blueprint?.recommendation_confidence || blueprint?.report_data?.recommendationConfidence || 0;
  const topMatches = blueprint?.report_data?.topCareerMatches || [];
  const isCareerDiscoveryComplete = careerDiscoveryDone || hasBlueprint;

  const progressSteps = [
    { label:"Profile Created", done:true },
    { label:"Career Discovery", done:isCareerDiscoveryComplete },
    { label:"Resume Builder", done:resumeDone },
    { label:"Interview Training", done:interviewDone },
    { label:"Applied to Role", done:false },
  ];
  const progressPct = Math.round((progressSteps.filter(s=>s.done).length / progressSteps.length) * 100);

  return e("div", { style: { minHeight:"100vh", background:C.bgSec } },
    // Navbar
    e("nav", { style: { background:C.purple, padding:"0 28px", height:64, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 20px rgba(75,0,130,0.35)" } },
      e("div", { style: { display:"flex", alignItems:"center", gap:12 } },
        e("div", { style: { width:38, height:38, background:C.gold, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:20, color:C.purple } }, "C"),
        e("div", null,
          e("div", { style: { color:C.white, fontWeight:800, fontSize:17, letterSpacing:"-0.3px" } }, "Campus2Board"),
          e("div", { style: { color:C.lavender, fontSize:10, fontWeight:600, letterSpacing:"1px", textTransform:"uppercase" } }, "Student Portal")
        )
      ),
      e("div", { style: { display:"flex", alignItems:"center", gap:16 } },
        e("div", { style: { textAlign:"right" } },
          e("div", { style: { color:C.white, fontSize:14, fontWeight:600 } }, displayName),
          college && e("div", { style: { color:C.lavender, fontSize:11 } }, college)
        ),
        e("button", { onClick:onLogout, style: { background:"rgba(255,255,255,0.1)", border:"none", borderRadius:8, padding:"8px 14px", color:C.white, cursor:"pointer", display:"flex", alignItems:"center", gap:6, fontSize:13, fontWeight:500 } }, e(Icons.logout), " Sign Out")
      )
    ),
    e("div", { style: { maxWidth:1100, margin:"0 auto", padding:"32px 24px" } },
      // Welcome Banner
      e("div", { style: { background:`linear-gradient(135deg, ${C.purple} 0%, #6A0DAD 100%)`, borderRadius:20, padding:"32px 36px", marginBottom:32, position:"relative", overflow:"hidden" } },
        e("div", { style: { position:"absolute", top:-40, right:-40, width:200, height:200, borderRadius:"50%", background:"rgba(245,158,11,0.15)" } }),
        e("div", { style: { position:"absolute", bottom:-60, right:100, width:160, height:160, borderRadius:"50%", background:"rgba(127,107,179,0.2)" } }),
        e("div", { style: { position:"relative", zIndex:1 } },
          e("div", { style: { display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:20 } },
            e("div", null,
              e("p", { style: { color:C.gold, fontSize:13, fontWeight:600, letterSpacing:"1px", textTransform:"uppercase", margin:"0 0 8px" } }, "Welcome back"),
              e("h1", { style: { color:C.white, fontSize:28, fontWeight:800, margin:"0 0 8px", letterSpacing:"-0.5px" } }, firstName + ", your career journey starts here."),
              e("p", { style: { color:"rgba(255,255,255,0.65)", fontSize:15, margin:0, maxWidth:480 } },
                interviewDone ? "Great progress! Explore open opportunities to apply with your validated profile." :
                resumeDone ? "Resume done! Complete AI Interview Training next to strengthen your application." :
                isCareerDiscoveryComplete ? "Career Discovery complete! Upload your CV next to keep building your profile." :
                "Begin with Career Discovery to get your personalised Career Blueprint and role recommendations."
              )
            ),
            hasBlueprint && e("div", { style: { background:"rgba(255,255,255,0.1)", borderRadius:16, padding:"20px 28px", textAlign:"center", backdropFilter:"blur(10px)", border:"1px solid rgba(255,255,255,0.15)" } },
              e("div", { style: { color:C.gold, fontSize:36, fontWeight:900, lineHeight:1, fontFamily:"monospace" } }, fitScore + "%"),
              e("div", { style: { color:"rgba(255,255,255,0.6)", fontSize:11, fontWeight:700, marginTop:5, letterSpacing:"0.8px", textTransform:"uppercase" } }, "Career Fit Score")
            )
          ),
          e("div", { style: { marginTop:28 } },
            e("div", { style: { display:"flex", justifyContent:"space-between", marginBottom:7 } },
              e("span", { style: { color:"rgba(255,255,255,0.55)", fontSize:11, fontWeight:700, letterSpacing:"0.8px", textTransform:"uppercase" } }, "Profile Completion"),
              e("span", { style: { color:C.gold, fontSize:12, fontWeight:800 } }, progressPct + "%")
            ),
            e("div", { style: { background:"rgba(255,255,255,0.12)", borderRadius:100, height:8, overflow:"hidden" } },
              e("div", { style: { background:`linear-gradient(90deg, ${C.gold}, ${C.goldLight})`, height:"100%", width:progressPct+"%", borderRadius:100, transition:"width 1.2s ease" } })
            ),
            e("div", { style: { display:"flex", alignItems:"center", gap:0, marginTop:14, flexWrap:"nowrap", overflowX:"auto" } },
              progressSteps.map((s,i) => e("div", { key:i, style: { display:"flex", alignItems:"center", flex: i < progressSteps.length-1 ? 1 : "none" } },
                e("div", { style: { display:"flex", flexDirection:"column", alignItems:"center", gap:5, minWidth:64 } },
                  e("div", { style: { width:20, height:20, borderRadius:"50%", background: s.done ? C.gold : "rgba(255,255,255,0.12)", border: s.done ? `2px solid ${C.gold}` : "2px solid rgba(255,255,255,0.25)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color: s.done ? C.purple : "transparent", fontWeight:900, flexShrink:0 } }, s.done ? "✓" : ""),
                  e("span", { style: { fontSize:10, fontWeight:600, color: s.done ? C.gold : "rgba(255,255,255,0.35)", textAlign:"center", whiteSpace:"nowrap" } }, s.label)
                ),
                i < progressSteps.length-1 && e("div", { style: { flex:1, height:2, background: s.done ? C.gold : "rgba(255,255,255,0.12)", margin:"0 4px", marginBottom:14 } })
              ))
            )
          )
        )
      ),
      // Blueprint Preview
      hasBlueprint && topMatches.length > 0 && e("div", { className:"fade-in", style: { background:C.white, borderRadius:18, border:`1px solid ${C.border}`, padding:28, marginBottom:32, borderLeft:`5px solid ${C.gold}`, boxShadow:"0 2px 12px rgba(75,0,130,0.06)" } },
        e("div", { style: { display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20, flexWrap:"wrap", gap:12 } },
          e("div", null,
            e("h3", { style: { margin:0, fontSize:17, fontWeight:800, color:C.charcoal } }, "Your Career Blueprint"),
            e("p", { style: { margin:"4px 0 0", fontSize:13, color:C.muted } }, `Generated ${new Date(blueprint.created_at).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}`)
          ),
          e("button", { onClick:() => handleModuleClick("career-discovery"), style: { background:"transparent", color:C.purple, border:`2px solid ${C.purple}`, borderRadius:10, padding:"9px 18px", fontWeight:600, fontSize:13, cursor:"pointer" } }, "View Full Report →")
        ),
        e("div", { style: { display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))", gap:14 } },
          topMatches.slice(0,3).map((m,i) => e("div", { key:i, style: { background:C.lavenderBg, borderRadius:12, padding:"16px 18px", border:`1px solid ${C.border}` } },
            e("div", { style: { display:"flex", alignItems:"center", gap:5, marginBottom:6 } }, e(Icons.star), e("span", { style: { fontSize:10, fontWeight:700, color:C.purple, textTransform:"uppercase", letterSpacing:"0.5px" } }, m.domain)),
            e("div", { style: { fontSize:14, fontWeight:700, color:C.charcoal, marginBottom:4 } }, m.roleTitle),
            e("div", { style: { fontSize:24, fontWeight:900, color:C.purple, fontFamily:"monospace" } }, `${m.careerFitScore}%`),
            e("div", { style: { fontSize:11, color:C.muted, marginTop:2 } }, "Career Fit")
          ))
        )
      ),
      // Module Cards
      e("h2", { style: { fontSize:20, fontWeight:800, color:C.charcoal, margin:"0 0 20px", letterSpacing:"-0.3px" } }, "Your Learning Modules"),
      e("div", { style: { display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:20 } },

            e("div", { style: { position:"absolute", top:0, left:0, right:0, height:4, background:mod.live ? `linear-gradient(90deg, ${mod.color}, ${mod.accent})` : C.border, borderRadius:"18px 18px 0 0" } }),
            e("div", { style: { display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:18, paddingTop:6 } },

      )

}

// ─── Root ───────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({ data:{ session } }) => { setUser(session?.user ?? null); setChecking(false); });
    const { data:{ subscription } } = sb.auth.onAuthStateChange((_ev, session) => setUser(session?.user ?? null));
    return () => subscription.unsubscribe();
  }, []);

  if (checking) return e("div", { style: { minHeight:"100vh", background:C.purple, display:"flex", alignItems:"center", justifyContent:"center" } },
    e("div", { style: { textAlign:"center" } },
      e("div", { style: { width:52, height:52, background:C.gold, borderRadius:14, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:24, color:C.purple, margin:"0 auto 16px" } }, "C"),
      e("div", { className:"spinner", style: { margin:"0 auto" } })
    )
  );

  if (!user) return e(AuthScreen, { onAuth:setUser });
  return e(Dashboard, { user, onLogout:async () => { await sb.auth.signOut(); setUser(null); } });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
