async function callGemini(prompt) {

// ─── Avatar component ─────────────────────────────────────────────────────────
function Avatar({ name, size=36, photo }) {
  const initials = (name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  if (photo) return e("img", { src:photo, className:"avatar", style:{width:size,height:size}, alt:name });
  return e("div", { className:"avatar-placeholder", style:{width:size,height:size,fontSize:size*0.36} }, initials);
}

// ─── Auth screen (reuses Supabase auth) ───────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  async function handleLogin(ev) {
    ev.preventDefault();
    setLoading(true); setError("");
    if (!sb) { setError("Unable to connect to the authentication service. Please reload and try again."); setLoading(false); return; }
    try {
      const { data, error: err } = await sb.auth.signInWithPassword({ email, password });
      if (err) { setError(err.message); setLoading(false); return; }
      onAuth(data.user);
    } catch (ex) {
      setError("Something went wrong while signing in. Please try again.");
      setLoading(false);
    }
  }

  return e("div", { style:{minHeight:"100vh",background:C.purple,display:"flex",alignItems:"center",justifyContent:"center",padding:20} },
    e("div", { className:"fade-up card", style:{width:"100%",maxWidth:400,padding:40} },
      e("div", { style:{textAlign:"center",marginBottom:32} },
        e("div", { style:{display:"inline-flex",alignItems:"center",gap:8,background:C.purple,borderRadius:12,padding:"8px 16px",marginBottom:16} },
          e("span", { style:{fontWeight:900,fontSize:18,color:C.gold} }, "C2B"),
          e("span", { style:{fontWeight:700,fontSize:14,color:"#fff",opacity:.9} }, "Community")
        ),
        e("h1", { style:{fontSize:22,fontWeight:800,color:C.text,marginBottom:6} }, "Welcome back"),
        e("p", { style:{fontSize:13.5,color:C.muted} }, "Sign in with your Campus2Board account")
      ),
      e("form", { onSubmit:handleLogin },
        e("div", { style:{marginBottom:14} },
          e("label", { style:{fontSize:12,fontWeight:600,color:C.muted,display:"block",marginBottom:5} }, "Email"),
          e("input", { className:"inp", type:"email", placeholder:"you@college.edu", value:email, onChange:ev=>setEmail(ev.target.value), required:true })
        ),
        e("div", { style:{marginBottom:20} },
          e("label", { style:{fontSize:12,fontWeight:600,color:C.muted,display:"block",marginBottom:5} }, "Password"),
          e("input", { className:"inp", type:"password", placeholder:"••••••••", value:password, onChange:ev=>setPassword(ev.target.value), required:true })
        ),
        error && e("p", { style:{fontSize:12,color:C.error,marginBottom:14,background:"#FEF2F2",padding:"8px 12px",borderRadius:8} }, error),
        e("button", { type:"submit", className:"btn-primary", disabled:loading, style:{width:"100%",padding:"12px",fontSize:14} },
          loading ? e("div",{className:"spinner",style:{width:18,height:18,margin:"0 auto"}}) : "Sign In"
        )
      ),
      e("p", { style:{textAlign:"center",fontSize:12,color:C.muted,marginTop:20} },
        "This uses your existing Campus2Board login."
      )
    )
  );
}

// ─── Domain Picker (first-time) ───────────────────────────────────────────────
function DomainPicker({ onComplete }) {
  const [selected, setSelected] = useState([]);
  const [saving, setSaving] = useState(false);

  function toggle(id) {
    setSelected(prev =>
      prev.includes(id) ? prev.filter(x=>x!==id) : prev.length < 3 ? [...prev,id] : prev
    );
  }

  async function handleSave() {
    if (selected.length === 0) return;
    setSaving(true);
    // In production: upsert to community_profiles table
    // await sb.from("community_profiles").upsert({ student_id: user.id, communities: selected })
    onComplete(selected);
  }

  return e("div", { style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24} },
    e("div", { className:"fade-up", style:{maxWidth:720,width:"100%"} },

      e("div", { style:{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:12,marginBottom:28} },
        DOMAINS.map(d =>
          e("div", { key:d.id, className:`domain-card ${selected.includes(d.id)?"selected":""}`, onClick:()=>toggle(d.id) },

          )

      ),
      e("div", { style:{textAlign:"center"} },
        e("p", { style:{fontSize:12,color:C.muted,marginBottom:14} },

// ─── Discussions tab ──────────────────────────────────────────────────────────
function DiscussionsPage({ filter, communities }) {
  const [tab, setTab] = useState("newest");
  const [search, setSearch] = useState("");
  const [creating, setCreating] = useState(false);
  const [discussions, setDiscussions] = useState(DISCUSSIONS);
  const [newTitle, setNewTitle] = useState("");
  const [newBody, setNewBody] = useState("");
  const [aiImproving, setAiImproving] = useState(false);
  const [domainFilter, setDomainFilter] = useState(filter||"all");

  const tabs = [
    { id:"newest", label:"Newest" },
    { id:"popular", label:"Popular" },
    { id:"answered", label:"Answered" },
    { id:"pinned", label:"Pinned" },
  ];

  function toggleBookmark(id) {
    setDiscussions(prev => prev.map(d => d.id===id ? {...d, bookmarked:!d.bookmarked} : d));
  }
  function toggleLike(id) {
    setDiscussions(prev => prev.map(d => d.id===id ? {...d, likes:d.liked?d.likes-1:d.likes+1, liked:!d.liked} : d));
  }

  let filtered = discussions;
  if (domainFilter !== "all") filtered = filtered.filter(d=>d.domain===domainFilter);
  if (search) filtered = filtered.filter(d=>d.title.toLowerCase().includes(search.toLowerCase()));
  if (tab==="popular") filtered = [...filtered].sort((a,b)=>b.likes-a.likes);
  if (tab==="answered") filtered = filtered.filter(d=>d.answered);
  if (tab==="pinned") filtered = filtered.filter(d=>d.pinned);

  async function handleImproveWriting() {
    if (!newBody) return;
    setAiImproving(true);
    const improved = await callGemini(`You are a writing assistant. Improve the clarity and professionalism of this text for an MBA student community forum. Keep the same meaning. Return ONLY the improved text, nothing else:\n\n${newBody}`);
    if (improved) setNewBody(improved);
    setAiImproving(false);
  }

  async function handlePost() {
    if (!newTitle.trim()) return;
    const disc = { id:`d${Date.now()}`, title:newTitle, body:newBody, author:"You", domain:domainFilter==="all"?(communities[0]||"consulting"):domainFilter, likes:0, comments:0, answers:0, bookmarked:false, pinned:false, tag:"Question", createdAt:"Just now", answered:false };
    setDiscussions(prev=>[disc,...prev]);
    setNewTitle(""); setNewBody(""); setCreating(false);
  }

  return e("div", { style:{padding:"28px 36px",maxWidth:900,margin:"0 auto"} },
    // Header
    e("div", { style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24} },
      e("h1", { style:{fontSize:22,fontWeight:800,color:C.text,letterSpacing:"-0.3px"} }, "Discussions"),
      e("button", { className:"btn-primary", style:{display:"flex",alignItems:"center",gap:6}, onClick:()=>setCreating(true) },
        Icon.plus(), "New Discussion"
      )
    ),

    // Filters
    e("div", { style:{display:"flex",gap:12,marginBottom:20,alignItems:"center"} },
      e("div", { style:{position:"relative",flex:1,maxWidth:320} },
        e("div", { style:{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:C.muted} }, Icon.search()),
        e("input", { className:"inp", style:{paddingLeft:38}, placeholder:"Search discussions…", value:search, onChange:ev=>setSearch(ev.target.value) })
      ),
      e("select", { className:"inp", style:{width:"auto",minWidth:150}, value:domainFilter, onChange:ev=>setDomainFilter(ev.target.value) },
        e("option",{value:"all"},"All Domains"),
        DOMAINS.map(d => e("option",{key:d.id,value:d.id},d.emoji+" "+d.label))
      )
    ),

    // Tabs
    e("div", { className:"card", style:{marginBottom:20,overflow:"hidden"} },
      e("div", { style:{display:"flex",borderBottom:"1px solid #EDE9F5",paddingTop:4} },
        tabs.map(t => e("button", { key:t.id, className:`tab ${tab===t.id?"active":""}`, onClick:()=>setTab(t.id) }, t.label))
      ),
      e("div", {},
        filtered.length === 0
          ? e("div", { style:{padding:40,textAlign:"center",color:C.muted,fontSize:13.5} }, "No discussions found.")
          : filtered.map(d =>
              e("div", { key:d.id, className:"disc-card" },
                e("div", { style:{display:"flex",alignItems:"flex-start",gap:14} },
                  e("div", { style:{flex:1} },
                    e("div", { style:{display:"flex",flexWrap:"wrap",alignItems:"center",gap:6,marginBottom:8} },
                      e(DomainTag,{domainId:d.domain}),
                      e("span", { className:"badge badge-purple" }, d.tag),
                      d.pinned && e("span", { className:"badge badge-gold" }, "📌 Pinned"),
                      d.answered && e("span", { className:"badge badge-green" }, Icon.check(11), " Answered")
                    ),
                    e("div", { style:{fontSize:14,fontWeight:700,color:C.text,marginBottom:6,lineHeight:1.5,cursor:"pointer"} }, d.title),
                    d.body && e("p", { style:{fontSize:13,color:C.muted,marginBottom:10,lineHeight:1.6} }, d.body.slice(0,120)+(d.body.length>120?"…":"")),
                    e("div", { style:{display:"flex",alignItems:"center",gap:16,fontSize:12,color:C.muted} },
                      e("span", { style:{fontWeight:600} }, d.author),
                      e("span", {}, d.createdAt),
                      e("button", { className:"btn-ghost", style:{padding:"3px 8px",fontSize:12,display:"flex",alignItems:"center",gap:4,color:d.liked?C.error:C.muted}, onClick:()=>toggleLike(d.id) }, Icon.heart(12,d.liked), d.likes),
                      e("span", { style:{display:"flex",alignItems:"center",gap:4} }, Icon.messageSquare(), d.comments, " comments"),
                      e("span", { style:{display:"flex",alignItems:"center",gap:4,color:C.success} }, Icon.check(), d.answers, " answers")
                    )
                  ),
                  e("button", { style:{background:"none",border:"none",cursor:"pointer",color:d.bookmarked?C.purple:C.muted,padding:4,marginTop:2}, onClick:()=>toggleBookmark(d.id) }, Icon.bookmark(17,d.bookmarked))
                )
              )
            )
      )
    ),

    // Create discussion modal
    creating && e("div", { className:"modal-overlay", onClick:()=>setCreating(false) },
      e("div", { className:"modal fade-up", style:{padding:32}, onClick:ev=>ev.stopPropagation() },
        e("div", { style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24} },
          e("h2", { style:{fontSize:18,fontWeight:800,color:C.text} }, "Start a Discussion"),
          e("button", { style:{background:"none",border:"none",cursor:"pointer",color:C.muted}, onClick:()=>setCreating(false) }, Icon.x())
        ),
        e("div", { style:{marginBottom:16} },
          e("label", { style:{fontSize:12,fontWeight:600,color:C.muted,display:"block",marginBottom:5} }, "Title *"),
          e("input", { className:"inp", placeholder:"e.g. How do I approach FMCG case interviews?", value:newTitle, onChange:ev=>setNewTitle(ev.target.value) })
        ),
        e("div", { style:{marginBottom:12} },
          e("div", { style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5} },
            e("label", { style:{fontSize:12,fontWeight:600,color:C.muted} }, "Details"),
            e("button", { style:{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#1D4ED8",display:"flex",alignItems:"center",gap:4,fontFamily:"Poppins,sans-serif",fontWeight:600}, onClick:handleImproveWriting, disabled:!newBody||aiImproving },
              Icon.sparkle(), aiImproving ? "Improving…" : "Improve with AI"
            )
          ),
          e("textarea", { className:"inp", placeholder:"Share context so mentors and peers can give better answers…", value:newBody, onChange:ev=>setNewBody(ev.target.value), style:{minHeight:120} })
        ),
        e("div", { style:{display:"flex",alignItems:"center",gap:8,marginBottom:20} },
          e(GeminiTag, { label:"Writes are improved before posting" })
        ),
        e("div", { style:{display:"flex",gap:10,justifyContent:"flex-end"} },
          e("button", { className:"btn-ghost", onClick:()=>setCreating(false) }, "Cancel"),
          e("button", { className:"btn-primary", onClick:handlePost, disabled:!newTitle.trim() }, "Post Discussion")
        )
      )
    )
  );
}

  }

  let shown = resources;
  if (search) shown = shown.filter(r=>r.title.toLowerCase().includes(search.toLowerCase()));
  if (typeFilter!=="all") shown = shown.filter(r=>r.type===typeFilter);
  if (domainFilter!=="all") shown = shown.filter(r=>r.domain===domainFilter);

    setAiLoading(true);
    const rec = await callGemini("You are a career advisor for MBA students. Recommend 3 types of resources an MBA student targeting consulting placements should focus on this week. Keep each recommendation to 1 sentence. Format as a JSON array of strings.");
    setAiLoading(false);
    if (rec) {
      try {
        const clean = rec.replace(/```json|```/g,"").trim();
        const parsed = JSON.parse(clean);
        setAiRec(Array.isArray(parsed) ? parsed : [rec]);
      } catch { setAiRec([rec]); }
    }

  const typeIcon = { PDF:"📄", Excel:"📊", PPT:"📊", Video:"🎥" };

      e("div",{style:{display:"flex",flexDirection:"column",gap:8}},

      e("select",{className:"inp",style:{width:"auto",minWidth:120},value:typeFilter,onChange:ev=>setTypeFilter(ev.target.value)},
        e("option",{value:"all"},"All Types"),
        e("option",{value:"PDF"},"PDF"),
        e("option",{value:"Excel"},"Excel"),
        e("option",{value:"PPT"},"PPT")
      ),
      e("select",{className:"inp",style:{width:"auto",minWidth:150},value:domainFilter,onChange:ev=>setDomainFilter(ev.target.value)},
        e("option",{value:"all"},"All Domains"),
        DOMAINS.map(d=>e("option",{key:d.id,value:d.id},d.label))

    e("div",{className:"card"},

  const icons = { booking:"📅", reply:"💬", event:"🎪", resource:"📄", course:"🎓" };

  return e("div",{className:"drawer-overlay",onClick:onClose},
    e("div",{className:"drawer",style:{padding:0},onClick:ev=>ev.stopPropagation()},
      e("div",{style:{padding:"20px 24px",borderBottom:"1px solid #EDE9F5",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"#fff",zIndex:10}},
        e("h2",{style:{fontSize:17,fontWeight:800,color:C.text}},"Notifications"),
        e("button",{style:{background:"none",border:"none",cursor:"pointer",color:C.muted},onClick:onClose},Icon.x())
      ),
      e("div",{},
        notifs.map(n=>
          e("div",{key:n.id,style:{padding:"16px 24px",borderBottom:"1px solid #EDE9F5",background:n.read?"#fff":"#FAFAFF",display:"flex",gap:14,alignItems:"flex-start"}},
            e("div",{style:{width:36,height:36,borderRadius:10,background:n.read?C.lavBg:`${C.purple}14`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}},icons[n.type]),
            e("div",{style:{flex:1}},
              e("p",{style:{fontSize:13,color:C.text,lineHeight:1.6,marginBottom:3}},n.text),
              e("p",{style:{fontSize:11,color:C.muted}},n.time)
            ),
            !n.read && e("div",{style:{width:8,height:8,borderRadius:"50%",background:C.purple,flexShrink:0,marginTop:6}})
          )
        )
      )
    )
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
function Community() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);
  const [communities, setCommunities] = useState([]);
  const [page, setPage] = useState("home");
  const [studentName, setStudentName] = useState("Student");
  const [activeMentor, setActiveMentor] = useState(null);
  const [notifOpen, setNotifOpen] = useState(false);
  const [hasJoined, setHasJoined] = useState(false);
  const [initError, setInitError] = useState(null);

  useEffect(() => {
    if (!sb) {
      setInitError("Could not connect to Campus2Board's authentication service. Please check your network connection and reload.");
      setChecking(false);
      return;
    }

    let unsubscribe = () => {};

    (async () => {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session?.user) {
          setUser(session.user);
          try {
            const { data } = await sb.from("students").select("name").eq("id", session.user.id).maybeSingle();
            if (data?.name) setStudentName(data.name);
          } catch (profileErr) {
            console.warn("Could not load student profile:", profileErr);
          }
          try {
            const saved = safeStorage.getItem(`c2b_communities_${session.user.id}`);
            if (saved) { setCommunities(JSON.parse(saved)); setHasJoined(true); }
          } catch (storageErr) {
            console.warn("Could not load saved communities:", storageErr);
          }
        }
      } catch (err) {
        console.error("Auth session check failed:", err);
        setInitError("Something went wrong while signing you in. Please reload the page.");
      } finally {
        setChecking(false);
      }
    })();

    try {
      const { data } = sb.auth.onAuthStateChange((_, session) => {
        setUser(session?.user ?? null);
      });
      unsubscribe = () => data?.subscription?.unsubscribe?.();
    } catch (err) {
      console.warn("Could not attach auth state listener:", err);
    }

    return () => unsubscribe();
  }, []);

  function handleDomainComplete(selected) {
    setCommunities(selected);
    setHasJoined(true);
    if (user) {
      try { safeStorage.setItem(`c2b_communities_${user.id}`, JSON.stringify(selected)); }
      catch (err) { console.warn("Could not save communities:", err); }
    }
  }

  async function handleLogout() {
    try { if (sb) await sb.auth.signOut(); }
    catch (err) { console.warn("Sign out error:", err); }
    setUser(null);
    setHasJoined(false);
    setCommunities([]);
  }

  if (checking) return e("div",{style:{minHeight:"100vh",background:C.purple,display:"flex",alignItems:"center",justifyContent:"center"}},
    e("div",{style:{textAlign:"center"}},
      e("div",{style:{width:52,height:52,background:C.gold,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:22,color:C.purple,margin:"0 auto 20px"}},"C"),
      e("div",{className:"spinner-gold",style:{width:28,height:28,margin:"0 auto"}})
    )
  );

  if (initError) return e("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}},
    e("div",{className:"card",style:{maxWidth:420,padding:32,textAlign:"center"}},
      e("div",{style:{fontSize:36,marginBottom:12}},"⚠️"),
      e("h2",{style:{fontSize:17,fontWeight:800,color:C.text,marginBottom:8}},"Couldn't load Community"),
      e("p",{style:{fontSize:13.5,color:C.muted,lineHeight:1.6,marginBottom:20}},initError),
      e("button",{className:"btn-primary",onClick:()=>window.location.reload()},"Reload Page")
    )
  );

  if (!user) return e(AuthScreen, { onAuth:setUser });
  if (!hasJoined) return e(DomainPicker, { onComplete:handleDomainComplete });

  // Determine which component to render
  const isDomainPage = page.startsWith("domain_");
  const domainId = isDomainPage ? page.replace("domain_","") : null;

  function renderPage() {
    if (activeMentor) return e(MentorProfile, { mentor:activeMentor, onBack:()=>setActiveMentor(null) });
    if (isDomainPage) return e(DomainPage, { domainId, setPage });
    switch(page) {
      case "home": return e(HomePage, { communities, studentName, setPage });
      case "discussions": return e(DiscussionsPage, { communities });
      case "mentors": return e(MentorsPage, { communities, setActiveMentor });
      case "events": return e(EventsPage);
      case "courses": return e(CoursesPage);
      case "resources": return e(ResourcesPage);
      default: return e(HomePage, { communities, studentName, setPage });
    }
  }

  return e("div",{style:{display:"flex",background:C.bg,minHeight:"100vh"}},
    e(Sidebar, { page, setPage, communities, studentName, onLogout:handleLogout }),

    e("div",{className:"main-content"},
      // Top bar
      e("div",{style:{height:56,background:"#fff",borderBottom:"1px solid #EDE9F5",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 28px",position:"sticky",top:0,zIndex:50}},
        e("div",{style:{display:"flex",alignItems:"center",gap:8}},
          e("span",{style:{fontSize:13,color:C.muted}},"Campus2Board"),
          e("span",{style:{fontSize:12,color:"#D1D5DB"}},"·"),
          e("span",{style:{fontSize:13,fontWeight:700,color:C.purple}},"Community"),
          e("span",{style:{fontSize:11,background:C.lavBg,color:C.purple,borderRadius:20,padding:"2px 8px",fontWeight:600,marginLeft:6}}, "BETA")
        ),
        e("div",{style:{display:"flex",alignItems:"center",gap:10}},
          e("button",{style:{background:"none",border:"none",cursor:"pointer",color:C.muted,position:"relative",padding:6},onClick:()=>setNotifOpen(true)},
            Icon.bell(18),
            e("span",{style:{position:"absolute",top:2,right:2,width:8,height:8,borderRadius:"50%",background:C.gold,border:"2px solid #fff"}})
          ),
          e("button",{style:{fontSize:12.5,color:C.purple,fontWeight:600,background:"transparent",display:"flex",alignItems:"center",gap:5,padding:"6px 14px",border:`1.5px solid ${C.purple}`,borderRadius:8,fontFamily:"Poppins,sans-serif"}},"← Back to Campus2Board")
        )
      ),

      // Page content
      e("div",{style:{minHeight:"calc(100vh - 56px)"}}, renderPage())
    ),

    notifOpen && e(NotificationsPanel, { onClose:()=>setNotifOpen(false) })
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(Community));
window.__c2bAppMounted = true;
</script>
</body>
</html>
